<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Viewer - Debug</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #222;
            color: white;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-size: 12px;
            max-width: 400px;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">Loading...</div>
    
    <script async src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/OrbitControls.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const info = document.getElementById('info');
        
        function log(msg) {
            console.log(msg);
            info.innerHTML += '<br>' + msg;
        }

        function waitForThree() {
            if (typeof THREE !== 'undefined') {
                log('THREE loaded');
                init();
            } else {
                setTimeout(waitForThree, 100);
            }
        }

        function init() {
            try {
                // Scene setup
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x333333);
                log('Scene created');

                // Camera setup
                const camera = new THREE.PerspectiveCamera(
                    75,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000
                );
                camera.position.set(0, 5, 10);
                log('Camera created');

                // Renderer setup
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                document.body.appendChild(renderer.domElement);
                log('Renderer created');

                // Lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 20, 10);
                scene.add(directionalLight);
                log('Lights added');

                // Orbit Controls
                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.autoRotate = false;
                log('Controls created');

                // Load GLTF model
                const loader = new THREE.GLTFLoader();
                
                const modelUrl = 'https://raw.githubusercontent.com/Kroy-Games/Stranded-Civilization-Creator/main/Test%20building.glb';
                log('Loading: ' + modelUrl);
                
                loader.load(
                    modelUrl,
                    (gltf) => {
                        log('Model loaded successfully');
                        const model = gltf.scene;
                        scene.add(model);

                        // Center and scale the model
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());
                        
                        log('Model size: ' + size.x.toFixed(2) + ', ' + size.y.toFixed(2) + ', ' + size.z.toFixed(2));
                        
                        model.position.sub(center);
                        controls.target.copy(center);
                        
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const fov = camera.fov * (Math.PI / 180);
                        let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                        cameraZ *= 1.5;
                        
                        camera.position.z = cameraZ;
                        camera.updateProjectionMatrix();
                        controls.update();
                        
                        log('Model positioned');
                        info.innerHTML = '✓ Model loaded! Drag to rotate, scroll to zoom, right-click to pan';
                    },
                    (progress) => {
                        log('Loading: ' + Math.round(progress.loaded / progress.total * 100) + '%');
                    },
                    (error) => {
                        log('ERROR loading model: ' + error.message);
                    }
                );

                // Handle window resize
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

                // Animation loop
                function animate() {
                    requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                }
                animate();
                
                log('Animation started');

            } catch (error) {
                log('ERROR: ' + error.message);
                console.error(error);
            }
        }

        waitForThree();
    </script>
</body>
</html>
